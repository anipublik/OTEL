# OpenTelemetry Collector config — .NET / ASP.NET Core
# .NET SDK defaults to OTLP/gRPC on 4317.
# For HTTP override: set OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf.

extensions:
  # health_check: GET /health on 13133. K8s liveness probe target.
  health_check:
    endpoint: "0.0.0.0:13133"

  # pprof: Collector process profiling on 1777.
  pprof:
    endpoint: "0.0.0.0:1777"

receivers:
  otlp:
    protocols:
      grpc:
        # 4317: IANA-registered OTLP/gRPC port.
        # .NET OTLP exporter uses gRPC by default when targeting .NET 6+.
        endpoint: "0.0.0.0:4317"
      http:
        # 4318: IANA-registered OTLP/HTTP port.
        # Required for .NET Framework apps where gRPC support is limited.
        endpoint: "0.0.0.0:4318"

processors:
  # memory_limiter: always first. .NET GC can generate bursty span output during
  # garbage collection cycles — the limiter prevents these bursts from OOM-ing the Collector.
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

  # resourcedetection: pod/node/namespace from K8s API.
  # k8s_api replaces deprecated k8snode detector.
  resourcedetection/k8s_api:
    detectors: [env, system, k8s_api]
    timeout: 5s
    override: false

  batch:
    send_batch_size: 1000
    timeout: 1s
    send_batch_max_size: 1500

exporters:
  # debug: verbose stdout. Remove or set verbosity: normal in production.
  debug:
    verbosity: detailed

  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: otel

  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      # TODO: add TLS for production — see infra/docker/README.md
      insecure: true

  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"
    default_labels_enabled:
      exporter: false
      job: true

service:
  extensions: [health_check, pprof]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection/k8s_api, batch]
      exporters: [debug, otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection/k8s_api, batch]
      exporters: [debug, prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection/k8s_api, batch]
      exporters: [debug, loki]
