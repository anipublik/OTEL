apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: otel-system
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: otel-starter
data:
  # collector.yaml: the Collector config mounted by both the DaemonSet and the Deployment.
  # Edit this ConfigMap to change Collector behavior without rebuilding images.
  # After editing: kubectl rollout restart daemonset/otel-collector -n otel-system
  collector.yaml: |
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
      pprof:
        endpoint: "0.0.0.0:1777"

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
      k8s_cluster:
        auth_type: serviceAccount
        collection_interval: 30s
        node_conditions_to_report: [Ready, MemoryPressure, DiskPressure, PIDPressure]
        allocatable_types_to_report: [cpu, memory, storage]
      hostmetrics:
        root_path: /hostfs
        collection_interval: 30s
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          filesystem:
            exclude_mount_points:
              match_type: regexp
              mount_points: ["/var/lib/docker/.*", "/var/lib/kubelet/.*"]
          network: {}
          load: {}
          processes: {}

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        filter:
          node_from_env_var: MY_NODE_NAME
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.namespace.name
            - k8s.node.name
            - container.id
            - container.image.name
            - container.image.tag
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      resourcedetection/k8s_api:
        detectors: [env, system, k8s_api]
        timeout: 5s
        override: false
      batch:
        send_batch_size: 1000
        timeout: 1s
        send_batch_max_size: 1500

    exporters:
      debug:
        verbosity: detailed
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: otel
      # Replace "tempo.otel-system.svc.cluster.local" with your Tempo endpoint.
      # For the local Docker stack, use "host.docker.internal:4317" instead.
      otlp/tempo:
        endpoint: "tempo.otel-system.svc.cluster.local:4317"
        tls:
          insecure: true
      loki:
        endpoint: "http://loki.otel-system.svc.cluster.local:3100/loki/api/v1/push"
        default_labels_enabled:
          exporter: false
          job: true

    service:
      extensions: [health_check, pprof]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection/k8s_api, batch]
          exporters: [debug, otlp/tempo]
        metrics:
          receivers: [otlp, k8s_cluster, hostmetrics]
          processors: [memory_limiter, k8sattributes, resourcedetection/k8s_api, batch]
          exporters: [debug, prometheus]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection/k8s_api, batch]
          exporters: [debug, loki]
