apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config-gateway
  namespace: otel-system
  labels:
    app.kubernetes.io/name: otel-collector-gateway
    app.kubernetes.io/component: deployment
    app.kubernetes.io/part-of: otel-starter
data:
  # Gateway config: cluster-wide receivers (k8s_cluster) and optional tail sampling.
  # hostmetrics is intentionally absent — it requires a hostfs mount on every node.
  collector.yaml: |
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
      pprof:
        endpoint: "0.0.0.0:1777"

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
      k8s_cluster:
        auth_type: serviceAccount
        collection_interval: 30s
        node_conditions_to_report: [Ready, MemoryPressure, DiskPressure, PIDPressure]
        allocatable_types_to_report: [cpu, memory, storage]

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 800
        spike_limit_mib: 200
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      resourcedetection/k8s_api:
        detectors: [env, system, k8s_api]
        timeout: 5s
        override: false
      batch:
        send_batch_size: 1000
        timeout: 1s
        send_batch_max_size: 1500

    exporters:
      debug:
        verbosity: detailed
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: otel
      otlp/tempo:
        endpoint: "tempo.otel-system.svc.cluster.local:4317"
        tls:
          insecure: true
      loki:
        endpoint: "http://loki.otel-system.svc.cluster.local:3100/loki/api/v1/push"
        default_labels_enabled:
          exporter: false
          job: true

    service:
      extensions: [health_check, pprof]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection/k8s_api, batch]
          exporters: [debug, otlp/tempo]
        metrics:
          receivers: [otlp, k8s_cluster]
          processors: [memory_limiter, k8sattributes, resourcedetection/k8s_api, batch]
          exporters: [debug, prometheus]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection/k8s_api, batch]
          exporters: [debug, loki]
