{{- if .Values.daemonset.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "otel-starter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otel-starter.labels" . | nindent 4 }}
    app.kubernetes.io/component: daemonset
spec:
  selector:
    matchLabels:
      {{- include "otel-starter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: daemonset
  template:
    metadata:
      labels:
        {{- include "otel-starter.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: daemonset
      annotations:
        # checksum/config: force pod restart when the ConfigMap changes.
        # Without this, pods keep the old config until the next rollout.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "otel-starter.serviceAccountName" . }}
      hostNetwork: {{ .Values.daemonset.hostNetwork }}
      {{- with .Values.daemonset.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: otel-collector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/otelcol-contrib/collector.yaml"]
          env:
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 4317
              protocol: TCP
              name: otlp-grpc
            - containerPort: 4318
              protocol: TCP
              name: otlp-http
            - containerPort: 8889
              protocol: TCP
              name: prom-metrics
            - containerPort: 13133
              protocol: TCP
              name: health
          volumeMounts:
            - name: collector-config
              mountPath: /etc/otelcol-contrib/collector.yaml
              subPath: collector.yaml
            - name: hostfs
              mountPath: /hostfs
              readOnly: true
              mountPropagation: HostToContainer
          resources:
            {{- toYaml .Values.daemonset.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: collector-config
          configMap:
            name: {{ include "otel-starter.fullname" . }}-config
        - name: hostfs
          hostPath:
            path: /
            type: Directory
      terminationGracePeriodSeconds: 60
{{- end }}
